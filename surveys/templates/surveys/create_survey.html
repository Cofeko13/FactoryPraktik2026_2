{% extends 'surveys/base.html' %}

{% block title %}Создание опроса{% endblock %}

{% block content %}
<div class="page-header">
    <h2>Создать новый опрос</h2>
</div>

<form method="POST" id="create-survey-form">
    {% csrf_token %}
    
    <div class="form-section">
        <h3>Основная информация</h3>
        <div class="form-group">
            <label for="title">Название опроса *</label>
            <input type="text" id="title" name="title" required placeholder="Введите название">
        </div>
        <div class="form-group">
            <label for="description">Описание</label>
            <textarea id="description" name="description" rows="3" placeholder="Опишите цель опроса"></textarea>
        </div>
    </div>

    <div class="form-section">
        <h3>Вопросы</h3>
        <div id="questions-container">
            <div class="question-item" data-index="0">
                <div class="question-header">
                    <span class="question-number">Вопрос 1</span>
                    <button type="button" class="btn-danger remove-question" style="display:none;">✕</button>
                </div>
                <div class="form-group">
                    <label>Текст вопроса</label>
                    <input type="text" name="question_text[]" required placeholder="Введите текст вопроса">
                </div>
                <div class="form-group">
                    <label>Тип вопроса</label>
                    <select name="question_type[]" class="question-type" onchange="toggleOptions(this)">
                        <option value="radio">Одиночный выбор</option>
                        <option value="checkbox">Множественный выбор</option>
                        <option value="text">Текстовый ответ</option>
                        <option value="scale">Шкала оценок 1-10</option>
                        <option value="matrix">Матрица</option>
                    </select>
                </div>
                <div class="options-container" style="display:none;">
                    <div class="form-group">
                        <label>Варианты ответов</label>
                        <div class="options-list">
                            <input type="text" name="options_0[]" placeholder="Вариант 1" class="option-input">
                            <input type="text" name="options_0[]" placeholder="Вариант 2" class="option-input">
                        </div>
                        <button type="button" class="btn-secondary add-option">➕ Добавить вариант</button>
                    </div>
                </div>
                <div class="matrix-container" style="display:none;">
                    <div class="form-group">
                        <label>Строки матрицы</label>
                        <div class="matrix-rows">
                            <input type="text" name="matrix_rows_0[]" placeholder="Строка 1" class="matrix-input">
                            <input type="text" name="matrix_rows_0[]" placeholder="Строка 2" class="matrix-input">
                        </div>
                        <button type="button" class="btn-secondary add-matrix-row">➕ Добавить строку</button>
                    </div>
                    <div class="form-group">
                        <label>Столбцы матрицы</label>
                        <div class="matrix-cols">
                            <input type="text" name="matrix_cols_0[]" placeholder="Столбец 1" class="matrix-input">
                            <input type="text" name="matrix_cols_0[]" placeholder="Столбец 2" class="matrix-input">
                        </div>
                        <button type="button" class="btn-secondary add-matrix-col">➕ Добавить столбец</button>
                    </div>
                </div>
            </div>
        </div>
        <button type="button" class="btn-secondary" onclick="addQuestion()">➕ Добавить вопрос</button>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn-primary">Сохранить опрос</button>
        <button type="reset" class="btn-secondary">Очистить</button>
    </div>
</form>

<script>
let questionCount = 1;

function addQuestion() {
    const container = document.getElementById('questions-container');
    const template = container.children[0].cloneNode(true);
    const index = questionCount++;
    
    // Обновляем индексы
    template.dataset.index = index;
    template.querySelector('.question-number').textContent = `Вопрос ${index + 1}`;
    template.querySelector('.remove-question').style.display = 'inline-block';
    
    // Обновляем name атрибуты
    template.querySelectorAll('[name]').forEach(el => {
        const name = el.getAttribute('name');
        if (name) {
            el.setAttribute('name', name.replace(/\[\d+\]/, `[${index}]`));
        }
    });
    
    // Очищаем значения
    template.querySelectorAll('input, textarea').forEach(el => {
        if (el.type !== 'button' && el.type !== 'submit') {
            el.value = '';
        }
    });
    
    container.appendChild(template);
}

function toggleOptions(select) {
    const item = select.closest('.question-item');
    const optionsContainer = item.querySelector('.options-container');
    const matrixContainer = item.querySelector('.matrix-container');
    
    if (select.value === 'radio' || select.value === 'checkbox') {
        optionsContainer.style.display = 'block';
        matrixContainer.style.display = 'none';
    } else if (select.value === 'matrix') {
        optionsContainer.style.display = 'none';
        matrixContainer.style.display = 'block';
    } else {
        optionsContainer.style.display = 'none';
        matrixContainer.style.display = 'none';
    }
}

// Добавление обработчиков для кнопок
document.addEventListener('click', function(e) {
    if (e.target.classList.contains('add-option')) {
        const container = e.target.closest('.options-container');
        const list = container.querySelector('.options-list');
        const input = document.createElement('input');
        input.type = 'text';
        input.name = list.querySelector('input')?.name || '';
        input.placeholder = `Вариант ${list.children.length + 1}`;
        input.className = 'option-input';
        list.appendChild(input);
    }
    
    if (e.target.classList.contains('add-matrix-row')) {
        const container = e.target.closest('.matrix-container');
        const rows = container.querySelector('.matrix-rows');
        const input = document.createElement('input');
        input.type = 'text';
        input.name = rows.querySelector('input')?.name || '';
        input.placeholder = `Строка ${rows.children.length + 1}`;
        input.className = 'matrix-input';
        rows.appendChild(input);
    }
    
    if (e.target.classList.contains('add-matrix-col')) {
        const container = e.target.closest('.matrix-container');
        const cols = container.querySelector('.matrix-cols');
        const input = document.createElement('input');
        input.type = 'text';
        input.name = cols.querySelector('input')?.name || '';
        input.placeholder = `Столбец ${cols.children.length + 1}`;
        input.className = 'matrix-input';
        cols.appendChild(input);
    }
    
    if (e.target.classList.contains('remove-question')) {
        if (confirm('Удалить этот вопрос?')) {
            e.target.closest('.question-item').remove();
        }
    }
});
</script>
{% endblock %}
